<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/theme.min.css">
    <title>PixelSafe Steganography</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', Arial, sans-serif;
            background: linear-gradient(180deg, #E6F0FA 0%, #F5F8FF 100%); /* Subtle light blue gradient */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1D1D1F; /* Darker text for contrast, Apple-like */
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            width: 900px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin: 40px 0;
        }

        .logo {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .logo a {
            text-decoration: none;
            color: #4A90E2; /* Primary blue */
            transition: color 0.3s ease;
        }

        .logo a:hover {
            color: #2A6DB0; /* Darker blue on hover */
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            gap: 20px;
        }

        .nav-bar button {
            padding: 12px 24px;
            border: none;
            background: #D6E6FF; /* Light blue */
            color: #1D1D1F;
            cursor: pointer;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-bar button.active {
            background: #4A90E2; /* Primary blue */
            color: white;
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
        }

        .nav-bar button:hover {
            background: #2A6DB0; /* Darker blue */
            color: white;
            transform: translateY(-2px); /* Subtle lift effect */
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .form-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .square-box {
            width: 180px;
            height: 180px;
            background: #F5F8FF; /* Off-white blue */
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .square-box:hover {
            transform: translateY(-5px); /* Lift effect on hover */
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #4A90E2; /* Primary blue */
        }

        .logo.inside-box {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .upload-btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #4A90E2; /* Primary blue */
            color: white;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            background: #2A6DB0; /* Darker blue */
            transform: translateY(-2px);
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #D6E6FF; /* Light blue border */
            border-radius: 8px;
            background: #F5F8FF; /* Off-white blue */
            color: #1D1D1F;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #4A90E2; /* Primary blue */
            box-shadow: 0 0 8px rgba(74, 144, 226, 0.3);
        }

        button.encode-btn,
        button.decode-btn {
            padding: 14px 28px;
            background: #4A90E2; /* Primary blue */
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            max-width: 300px;
            margin: 20px auto;
            transition: all 0.3s ease;
        }

        button.encode-btn:hover,
        button.decode-btn:hover {
            background: #2A6DB0; /* Darker blue */
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(74, 144, 226, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><a href="index.html">🌐 <b>PixelSafe</b></a></div>
        <div class="nav-bar">
            <button id="encoding-btn" class="active">Encoding</button>
            <button id="decoding-btn">Decoding</button>
        </div>
        <div id="encoding-section" class="section active">
            <div class="form-group">
                <div class="square-box">
                    <label>Image</label>
                    <div class="logo inside-box">🌄</div>
                    <button class="upload-btn" onclick="document.getElementById('image').click()">Upload</button>
                    <input type="file" id="image" accept="image/*" style="display:none;">
                </div>
                <div class="square-box">
                    <label>Video</label>
                    <div class="logo inside-box">🎥</div>
                    <button class="upload-btn" onclick="document.getElementById('video').click()">Upload</button>
                    <input type="file" id="video" accept="video/*" style="display:none;">
                </div>
                <div class="square-box">
                    <label>Audio</label>
                    <div class="logo inside-box">🎵</div>
                    <button class="upload-btn" onclick="document.getElementById('audio').click()">Upload</button>
                    <input type="file" id="audio" accept="audio/*" style="display:none;">
                </div>
            </div>
            <div class="form-group">
                <div class="square-box">
                    <label>Hidden Image</label>
                    <div class="logo inside-box">🌄</div>
                    <button class="upload-btn" onclick="document.getElementById('hidden-image').click()">Upload</button>
                    <input type="file" id="hidden-image" accept="image/*" style="display:none;">
                </div>
                <div class="square-box">
                    <label>Hidden Video</label>
                    <div class="logo inside-box">🎥</div>
                    <button class="upload-btn" onclick="document.getElementById('hidden-video').click()">Upload</button>
                    <input type="file" id="hidden-video" accept="video/*" style="display:none;">
                </div>
                <div class="square-box">
                    <label>Hidden Audio</label>
                    <div class="logo inside-box">🎵</div>
                    <button class="upload-btn" onclick="document.getElementById('hidden-audio').click()">Upload</button>
                    <input type="file" id="hidden-audio" accept="audio/*" style="display:none;">
                </div>
            </div>
            <div class="form-group">
                <div class="square-box" style="flex-grow: 1;">
                    <label for="password-encode">Optional Password:</label>
                    <input type="password" id="password-encode" placeholder="Enter password (optional)">
                </div>
            </div>
            <button class="encode-btn" onclick="encode()">Encode</button>
        </div>
        <div id="decoding-section" class="section">
            <div class="form-group">
                <div class="square-box">
                    <label>Upload Stego Image:</label>
                    <div class="logo inside-box">🌄</div>
                    <button class="upload-btn" onclick="document.getElementById('stego-image').click()">Upload</button>
                    <input type="file" id="stego-image" accept="image/*" style="display:none;">
                </div>
                <div class="square-box">
                    <label>Upload Stego Video:</label>
                    <div class="logo inside-box">🎥</div>
                    <button class="upload-btn" onclick="document.getElementById('stego-video').click()">Upload</button>
                    <input type="file" id="stego-video" accept="video/*" style="display:none;">
                </div>
                <div class="square-box">
                    <label>Upload Stego Audio:</label>
                    <div class="logo inside-box">🎵</div>
                    <button class="upload-btn" onclick="document.getElementById('stego-audio').click()">Upload</button>
                    <input type="file" id="stego-audio" accept="audio/*" style="display:none;">
                </div>
            </div>
            <div class="form-group">
                <div class="square-box" style="flex-grow: 1;">
                    <label for="password-decode">Optional Password:</label>
                    <input type="password" id="password-decode" placeholder="Enter password (optional)">
                </div>
            </div>
            <button class="decode-btn" onclick="decode()">Decode</button>
        </div>
    </div>
    <script>
        const encodingBtn = document.getElementById('encoding-btn');
        const decodingBtn = document.getElementById('decoding-btn');
        const encodingSection = document.getElementById('encoding-section');
        const decodingSection = document.getElementById('decoding-section');

        encodingBtn.addEventListener('click', () => {
            encodingBtn.classList.add('active');
            decodingBtn.classList.remove('active');
            encodingSection.classList.add('active');
            decodingSection.classList.remove('active');
        });

        decodingBtn.addEventListener('click', () => {
            decodingBtn.classList.add('active');
            encodingBtn.classList.remove('active');
            decodingSection.classList.add('active');
            encodingSection.classList.remove('active');
        });

        function encode() {
            alert('Encoding process started (simulation). In a real app, this would process the files.');
        }

        function decode() {
            alert('Decoding process started (simulation). In a real app, this would extract the hidden file.');
        }
    </script>
</body>
</html>
