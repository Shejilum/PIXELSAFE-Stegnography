<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelSafe - Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #0a0f2b; --dark-blue: #111827; --medium-blue: #1e293b;
            --accent-blue: #3b82f6; --light-blue: #60a5fa; --bright-blue: #93c5fd;
            --neon-blue: #00d9ff; --admin-purple: #8b5cf6; --text-light: #e5e7eb;
            --text-muted: #9ca3af;
            --gradient: linear-gradient(135deg, var(--accent-blue), var(--light-blue));
            --admin-gradient: linear-gradient(135deg, var(--admin-purple), var(--accent-blue));
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--deep-blue) 0%, var(--dark-blue) 100%); color: var(--text-light); line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        .navbar { background: rgba(10, 15, 43, 0.95); backdrop-filter: blur(10px); padding: 15px 0; border-bottom: 1px solid rgba(59, 130, 246, 0.1); position: sticky; top: 0; z-index: 100; }
        .navbar-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: 700; text-decoration: none; color: var(--text-light); }
        .logo span { background: var(--admin-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 10px rgba(139, 92, 246, 0.3); }
        .container { display: flex; flex: 1; align-items: center; justify-content: center; padding: 40px 20px; position: relative; }
        .container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" opacity="0.03"><polygon fill="%238b5cf6" points="0,1000 0,0 1000,0"/></svg>'); background-size: cover; }
        .login-panel { background: linear-gradient(135deg, var(--medium-blue), var(--dark-blue)); backdrop-filter: blur(10px); padding: 50px 40px; border-radius: 16px; width: 450px; max-width: 90%; text-align: center; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); border: 1px solid rgba(139, 92, 246, 0.2); position: relative; z-index: 1; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .admin-badge { position: absolute; top: -15px; right: 30px; background: var(--admin-gradient); color: white; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }
        .login-header h1 { font-size: 2.2rem; background: var(--admin-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .security-notice { background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 8px; padding: 15px; margin: 20px 0; text-align: center; font-size: 0.85rem; color: var(--text-muted); }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-control { width: 100%; padding: 15px 15px 15px 45px; background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(139, 92, 246, 0.2); border-radius: 8px; color: var(--text-light); }
        .btn-primary { width: 100%; padding: 15px; border-radius: 8px; font-weight: 600; background: var(--admin-gradient); color: white; border: none; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.5); }
        .login-links { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }
        .login-links a { color: var(--light-blue); text-decoration: none; font-size: 0.9rem; cursor: pointer; }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 15, 43, 0.9); backdrop-filter: blur(10px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: var(--medium-blue); border: 1px solid var(--admin-purple); padding: 30px; border-radius: 16px; width: 400px; text-align: center; box-shadow: 0 0 30px rgba(139, 92, 246, 0.2); }
        .hint-box { background: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 8px; font-family: 'Courier New', monospace; color: var(--neon-blue); margin: 20px 0; border-left: 4px solid var(--admin-purple); text-align: left; font-size: 1.1rem; line-height: 1.8; }
        .close-modal { background: var(--admin-gradient); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }

        .floating-shapes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; }
        .floating-shape { position: absolute; border-radius: 50%; background: rgba(139, 92, 246, 0.05); animation: float 20s infinite ease-in-out; }
        .shape-1 { width: 200px; height: 200px; top: 10%; left: 10%; }
        .shape-2 { width: 150px; height: 150px; top: 60%; right: 10%; animation-delay: 5s; }
        .shape-3 { width: 100px; height: 100px; bottom: 20%; left: 20%; animation-delay: 10s; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        footer { background: var(--deep-blue); padding: 20px 0; border-top: 1px solid rgba(59, 130, 246, 0.1); text-align: center; color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-container">
            <a href="/index/" class="logo"><i class="fas fa-user-secret"></i><span>PixelSafe</span></a>
        </div>
    </header>

    <div class="container">
        <div class="floating-shapes">
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>
            <div class="floating-shape shape-3"></div>
        </div>
        
        <div class="login-panel">
            <div class="admin-badge"><i class="fas fa-shield-alt"></i> Admin Access</div>
            <div class="login-header">
                <h1>Admin Login</h1>
                <p>Authorized access only</p>
            </div>
            <div class="security-notice"><i class="fas fa-exclamation-triangle"></i> Encrypted Terminal Access</div>
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email Address</label>
                    <div style="position: relative;">
                        <i class="fas fa-envelope" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <i class="fas fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Login as Admin</button>
            </form>
            
            <div class="login-links">
                <a href="/login/"><i class="fas fa-user"></i> Switch to User Login</a>
                <a id="forgetHintBtn"><i class="fas fa-key"></i> Forgot admin credentials?</a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="hintModal">
        <div class="modal-content">
            <i class="fas fa-user-shield" style="font-size: 3rem; color: var(--admin-purple); margin-bottom: 15px;"></i>
            <h3>Credential Hint</h3>
            <p style="font-size: 0.9rem; color: var(--text-muted);">Access requires internal BCA admin privileges.</p>
            <div class="hint-box">
                USER: adm***@bca<br>
                PASS: b*****
            </div>
            <button class="close-modal" id="closeHintBtn">Access Terminal</button>
        </div>
    </div>

    <footer><p>&copy; 2023 PixelSafe. All rights reserved.</p></footer>

    <script>
        const modal = document.getElementById('hintModal');
        document.getElementById('forgetHintBtn').addEventListener('click', () => modal.style.display = 'flex');
        document.getElementById('closeHintBtn').addEventListener('click', () => modal.style.display = 'none');
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    </script>
</body>
</html>
