<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PixelSafe - New Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Paste all the CSS from your login.html here */
        :root { --deep-blue: #0a0f2b; --dark-blue: #111827; --medium-blue: #1e293b; --accent-blue: #3b82f6; --light-blue: #60a5fa; --bright-blue: #93c5fd; --neon-blue: #00d9ff; --text-light: #e5e7eb; --text-muted: #9ca3af; --gradient: linear-gradient(135deg, var(--accent-blue), var(--light-blue)); --neon-gradient: linear-gradient(135deg, var(--neon-blue), var(--light-blue)); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--deep-blue) 0%, var(--dark-blue) 100%); color: var(--text-light); line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        .container { display: flex; flex: 1; align-items: center; justify-content: center; padding: 40px 20px; position: relative; }
        .login-panel { background: linear-gradient(135deg, var(--medium-blue), var(--dark-blue)); padding: 50px 40px; border-radius: 16px; width: 450px; text-align: center; border: 1px solid rgba(59, 130, 246, 0.1); }
        .login-header h1 { font-size: 2.2rem; background: linear-gradient(90deg, #fff, var(--bright-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-header p { color: var(--text-muted); margin-bottom: 30px;}
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-light); }
        .input-with-icon { position: relative; }
        .input-with-icon i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .form-control { width: 100%; padding: 15px 15px 15px 45px; background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 8px; color: var(--text-light); }
        .btn-primary { width: 100%; padding: 15px; border-radius: 8px; font-weight: 600; background: var(--gradient); color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-panel">
            <div class="login-header">
                <h1>Create New Password</h1>
                <p>Secure your account with a new password</p>
            </div>
            {% if error %}
            <div style="background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; padding: 10px; border-radius: 8px; margin-bottom: 20px;">{{ error }}</div>
            {% endif %}
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" name="new_password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" class="form-control" name="confirm_password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Save Password & Login</button>
            </form>
        </div>
    </div>
</body>
</html>
